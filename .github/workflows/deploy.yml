name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/dp-proj-00-03-front/front

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Property tests
        run: pnpm test:properties

      - name: Integration tests
        run: pnpm test -- tests/integration

      - name: Build
        run: pnpm build
        env:
          CMS_URL: ${{ secrets.CMS_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  build-and-push:
    name: Build & Push Docker image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      previous_image: ${{ steps.current_revision.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Get current Cloud Run revision (rollback)
        id: current_revision
        run: |
          image=$(gcloud run services describe dp-proj-00-03-front \
            --region="${{ secrets.GCP_REGION }}" \
            --format='value(spec.template.spec.containers[0].image)' \
            2>/dev/null || echo "")
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CMS_URL=${{ secrets.CMS_URL }}
            TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Cloud Run + Firebase Hosting
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build static client for Firebase Hosting CDN
        run: pnpm build
        env:
          CMS_URL: ${{ secrets.CMS_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Verify dist/client
        run: |
          mkdir -p dist/client
          if [ ! "$(ls -A dist/client 2>/dev/null)" ]; then
            touch dist/client/.gitkeep
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve container image
        id: image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dp-proj-00-03-front/front@${{ needs.build-and-push.outputs.digest }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: cloudrun
        run: |
          gcloud run deploy dp-proj-00-03-front \
            --region="${{ secrets.GCP_REGION }}" \
            --image="${{ steps.image.outputs.uri }}" \
            --port=8080 \
            --min-instances=1 \
            --memory=1Gi \
            --cpu=1 \
            --cpu-boost \
            --timeout=60 \
            --set-env-vars="CMS_URL=${{ secrets.CMS_URL }}" \
            --startup-probe=tcpSocket.port=8080,initialDelaySeconds=5,timeoutSeconds=5,periodSeconds=10,failureThreshold=36 \
            --liveness-probe=httpGet.path=/api/health,httpGet.port=8080,initialDelaySeconds=10,timeoutSeconds=5,periodSeconds=30,failureThreshold=3 \
            --service-account=dp-proj-00-03-front@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --update-labels=managed-by=github-actions,commit-sha=${{ github.sha }} \
            --quiet
          URL=$(gcloud run services describe dp-proj-00-03-front \
            --region="${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Cloud Run health check
        run: |
          BASE="${{ steps.cloudrun.outputs.url }}"
          for i in $(seq 1 12); do
            health=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health" || echo "000")
            if [ "$health" = "200" ]; then
              echo "Cloud Run health OK"
              break
            fi
            echo "Intento $i health: $health"
            sleep 5
            if [ "$i" = "12" ]; then exit 1; fi
          done
          # SSR debe responder (404 sin Host de tenant es válido; 000/5xx indica crash de runtime)
          for i in $(seq 1 6); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$BASE/es/inicio" || echo "000")
            if [ "$status" != "000" ]; then
              echo "Cloud Run SSR probe /es/inicio → HTTP $status"
              exit 0
            fi
            echo "Intento $i SSR probe: sin respuesta (timeout)"
            sleep 5
          done
          echo "SSR no respondió a tiempo (revisar logs: ERR_MODULE_NOT_FOUND, CMS_URL, etc.)"
          exit 1

      - name: Configure firebase.json
        env:
          FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          test -n "$FIREBASE_HOSTING_SITE"
          test -n "$GCP_REGION"
          jq \
            --arg site "$FIREBASE_HOSTING_SITE" \
            --arg region "$GCP_REGION" \
            '.hosting.site = $site | .hosting.rewrites[0].run.region = $region' \
            firebase.json > firebase.tmp.json
          mv firebase.tmp.json firebase.json
          cat firebase.json

      - name: Deploy Firebase Hosting
        id: hosting
        run: |
          npx firebase-tools deploy \
            --only hosting \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --non-interactive

      - name: Firebase Hosting health check
        env:
          FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE }}
        run: |
          URL="https://${FIREBASE_HOSTING_SITE}.web.app/api/health"
          for i in $(seq 1 12); do
            body=$(curl -sf "$URL" 2>/dev/null || true)
            if echo "$body" | grep -q '"component":"frontend"'; then
              echo "Hosting + SSR OK: $body"
              exit 0
            fi
            echo "Intento $i: esperando SSR vía Hosting..."
            sleep 5
          done
          echo "Health vía Hosting falló"
          exit 1

      - name: Rollback Cloud Run on failure
        if: failure()
        run: |
          PREV="${{ needs.build-and-push.outputs.previous_image }}"
          if [ -n "$PREV" ]; then
            gcloud run services update dp-proj-00-03-front \
              --region="${{ secrets.GCP_REGION }}" \
              --image="$PREV" \
              --quiet
          fi
