name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Property tests
        run: pnpm test:properties

      - name: Integration tests
        run: pnpm test -- tests/integration

      - name: Build
        id: build
        run: pnpm build
        env:
          CMS_URL: ${{ secrets.CMS_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure firebase.json (Hosting site)
        env:
          FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE }}
        run: |
          if [ -z "$FIREBASE_HOSTING_SITE" ]; then
            echo "Falta el secret FIREBASE_HOSTING_SITE (terraform output -raw firebase_hosting_site)"
            exit 1
          fi
          # firebase-tools exige que hosting.site en firebase.json coincida con el sitio del proyecto
          jq --arg site "$FIREBASE_HOSTING_SITE" '.hosting.site = $site' firebase.json > firebase.tmp.json
          mv firebase.tmp.json firebase.json
          echo "firebase.json → hosting.site=$(jq -r '.hosting.site' firebase.json)"

      - name: Deploy to Firebase Hosting
        id: deploy
        run: |
          npx firebase-tools deploy \
            --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive
        timeout-minutes: 5

      - name: Health check post-deploy
        id: health_check
        env:
          FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE }}
        run: |
          URL="https://${FIREBASE_HOSTING_SITE}.web.app/api/health-check"
          for i in $(seq 1 6); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "404" ]; then
              # 404 es aceptable (dominio de prueba sin tenant configurado)
              echo "Deploy verificado OK (status: $status)"
              exit 0
            fi
            echo "Intento $i: status $status, esperando 10s..."
            sleep 10
          done
          echo "Deploy no verificado en 60s"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        env:
          FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE }}
        run: |
          echo "Rollback: restaurando versión anterior..."
          jq --arg site "$FIREBASE_HOSTING_SITE" '.hosting.site = $site' firebase.json > firebase.tmp.json
          mv firebase.tmp.json firebase.json
          npx firebase-tools hosting:rollback \
            --site "$FIREBASE_HOSTING_SITE" \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive
        timeout-minutes: 5
