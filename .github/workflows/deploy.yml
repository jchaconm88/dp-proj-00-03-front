name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Property tests
        run: pnpm test:properties

      - name: Integration tests
        run: pnpm test -- tests/integration

      - name: Build
        id: build
        run: pnpm build
        env:
          CMS_URL: ${{ secrets.CMS_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Deploy to Firebase Hosting
        id: deploy
        run: |
          npx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
        timeout-minutes: 5

      - name: Health check post-deploy
        id: health_check
        run: |
          URL="https://dp-proj-00-03-front.web.app/api/health-check"
          for i in $(seq 1 6); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "404" ]; then
              # 404 es aceptable (dominio de prueba sin tenant configurado)
              echo "Deploy verificado OK (status: $status)"
              exit 0
            fi
            echo "Intento $i: status $status, esperando 10s..."
            sleep 10
          done
          echo "Deploy no verificado en 60s"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Rollback: restaurando versión anterior..."
          # Firebase Hosting guarda el historial de releases
          npx firebase-tools hosting:rollback --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive
        timeout-minutes: 5
